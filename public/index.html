<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Football Intelligence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#080808;--bg2:#111;--bg3:#1a1a1a;--card:#141414;--green:#00E676;--blue:#2979FF;--red:#FF5252;--yellow:#FFD740;--text:#f0f0f0;--muted:#888;--border:#2a2a2a;--safe-bottom:env(safe-area-inset-bottom,0px)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{max-width:1400px;margin:0 auto;padding:0 12px}

/* HEADER */
.hdr{background:linear-gradient(135deg,#0a0a0a,#141414);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.hdr h1{font-size:18px;font-weight:700;color:var(--green);letter-spacing:-0.5px}
.hdr p{font-size:10px;color:var(--muted);margin-top:1px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.cache-badge{font-size:10px;color:var(--muted);background:var(--bg3);padding:3px 8px;border-radius:8px;border:1px solid var(--border)}
.cache-badge.hit{color:var(--green);border-color:rgba(0,230,118,.3)}
@media(max-width:480px){.cache-badge{display:none}.hdr p{display:none}}

/* NAV TABS */
.nav-tabs{display:flex;gap:2px;padding:8px 0 0}
.nav-tab{padding:8px 16px;border-radius:10px 10px 0 0;border:1px solid var(--border);border-bottom:none;background:var(--bg2);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;flex:1;text-align:center}
.nav-tab.active{background:var(--card);color:var(--green)}
.tab-content{display:none}
.tab-content.active{display:block}

/* DAY BAR */
.days{display:flex;gap:6px;padding:12px 0 8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.days::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;position:relative;min-height:36px}
.day-btn.active{background:linear-gradient(135deg,#00E676,#00C853);color:#000;border-color:transparent;box-shadow:0 0 12px rgba(0,230,118,.3)}
.day-btn.has-cache::after{content:'';position:absolute;top:4px;right:4px;width:5px;height:5px;border-radius:50%;background:var(--green)}

/* LEAGUE BAR */
.leagues{display:flex;gap:6px;flex-wrap:nowrap;padding:4px 0 8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.leagues::-webkit-scrollbar{display:none}
.lg-btn{flex-shrink:0;padding:5px 10px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:3px}
.lg-btn.active{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.08)}
.lg-cnt{background:var(--border);color:var(--muted);border-radius:8px;padding:1px 4px;font-size:10px}
.lg-btn.active .lg-cnt{background:rgba(0,230,118,.2);color:var(--green)}

/* FILTERS */
.filters{display:flex;gap:6px;flex-wrap:nowrap;padding:0 0 10px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:5px 11px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;min-height:32px}
.filter-btn.active{border-color:var(--yellow);color:var(--yellow);background:rgba(255,215,64,.08)}

/* LAYOUT */
.main{display:flex;gap:14px;align-items:flex-start;padding-bottom:100px}
.matches-col{flex:1;min-width:0}

/* MATCH CARD */
.match-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.mc-hdr{padding:8px 12px;display:flex;align-items:center;gap:8px}
.mc-league{font-size:10px;font-weight:700;letter-spacing:.4px;color:var(--muted);flex:1}
.mc-status-ft{font-size:10px;font-weight:700;color:var(--muted);background:var(--bg3);padding:2px 6px;border-radius:6px}
.mc-status-live{font-size:10px;font-weight:700;color:var(--red);display:flex;align-items:center;gap:3px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.2s infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.mc-teams{padding:10px 12px 6px;display:flex;align-items:center;gap:6px}
.mc-team{flex:1;font-size:13px;font-weight:600;line-height:1.3}
.mc-team.away{text-align:right}
.mc-score{font-size:20px;font-weight:800;color:var(--text);text-align:center;min-width:52px;letter-spacing:2px}
.mc-score.ns{font-size:12px;color:var(--muted);letter-spacing:0;font-weight:500}
.mc-form{padding:0 12px 6px;display:flex;gap:6px}
.form-group{flex:1}
.form-label{font-size:9px;color:var(--muted);font-weight:700;margin-bottom:2px}
.form-dots{display:flex;gap:2px}
.fd{width:13px;height:13px;border-radius:2px;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#000}
.fd.W{background:var(--green)}.fd.D{background:var(--yellow)}.fd.L{background:var(--red)}.fd.U{background:var(--border);color:var(--muted)}
.mc-cats{padding:0 12px 12px}
.cat-section{margin-top:6px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.cat-title{padding:8px 10px;background:var(--bg2);display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:11px;font-weight:700;color:var(--muted);user-select:none;min-height:36px}
.cat-body{padding:8px;display:none}
.cat-body.open{display:block}
.odds-grid{display:flex;flex-wrap:wrap;gap:5px}
.odd-btn{flex:1;min-width:120px;padding:8px 9px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;transition:all .15s;text-align:left;position:relative;min-height:44px}
.odd-btn.selected{border-color:var(--green);background:rgba(0,230,118,.1)}
.odd-label{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:3px}
.odd-val{font-size:15px;font-weight:700;color:var(--blue)}
.odd-prob{font-size:10px;margin-top:2px}
.prob-bar{height:3px;border-radius:2px;margin-top:3px;background:var(--border);overflow:hidden}
.prob-fill{height:100%;border-radius:2px;transition:width .4s}
.star{color:var(--yellow)}
.bb-badge{position:absolute;top:3px;right:3px;background:var(--blue);color:#fff;font-size:9px;font-weight:700;padding:1px 3px;border-radius:3px}

/* DESKTOP TICKET PANEL */
.ticket-panel{width:300px;flex-shrink:0;position:sticky;top:68px}
@media(max-width:768px){.ticket-panel{display:none}}

/* MOBILE TICKET BOTTOM DRAWER */
.mobile-ticket-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:150;background:var(--card);border-top:1px solid var(--border);padding:10px 14px calc(10px + var(--safe-bottom));box-shadow:0 -4px 20px rgba(0,0,0,.5)}
.mobile-ticket-bar.has-selections{background:linear-gradient(135deg,#0d1f15,#0d1520)}
@media(max-width:768px){.mobile-ticket-bar{display:flex;align-items:center;gap:10px}}
.mtb-info{flex:1}
.mtb-count{font-size:11px;color:var(--muted)}
.mtb-odd{font-size:18px;font-weight:800;color:var(--green)}
.mtb-btn{padding:10px 18px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--green),#00C853);color:#000;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap}
.mtb-btn:disabled{background:var(--border);color:var(--muted)}
.mtb-open{padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer}

/* TICKET DRAWER (mobile full screen) */
.ticket-drawer{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;background:var(--bg);transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.ticket-drawer.open{transform:translateY(0)}
.td-hdr{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:var(--bg2)}
.td-hdr h2{font-size:16px;font-weight:700;flex:1}
.td-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:0 4px;line-height:1}
.td-body{flex:1;overflow-y:auto;padding:0 16px;-webkit-overflow-scrolling:touch}
.td-footer{padding:14px 16px calc(14px + var(--safe-bottom));border-top:1px solid var(--border);background:var(--bg2)}

/* TICKET SHARED STYLES */
.tp{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tp-hdr{padding:12px 14px;background:linear-gradient(135deg,#141414,#1e1e1e);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.tp-hdr h2{font-size:14px;font-weight:700;flex:1}
.tp-cnt{font-size:11px;color:var(--muted)}
.tp-cnt span{color:var(--green);font-weight:700}
.tp-empty{padding:20px;text-align:center;color:var(--muted);font-size:12px}
.tp-sel-list{max-height:260px;overflow-y:auto}
@media(max-width:768px){.tp-sel-list{max-height:none}}
.tp-sel{padding:8px 14px;border-bottom:1px solid var(--border)}
.tp-sel-match{font-size:10px;color:var(--muted);margin-bottom:2px;display:flex;align-items:center;gap:5px}
.tp-sel-row{font-size:12px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.tp-sel-odd{color:var(--blue);font-size:14px;font-weight:700}
.tp-day{font-size:9px;background:var(--bg3);border:1px solid var(--border);padding:1px 5px;border-radius:6px;color:var(--muted)}
.tp-remove{background:none;border:none;color:#555;cursor:pointer;font-size:16px;padding:4px 6px;min-width:32px;min-height:32px}
.tp-remove:hover,.tp-remove:active{color:var(--red)}
.tp-calc{padding:12px 14px;border-top:1px solid var(--border);background:var(--bg2)}
.stake-row{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.stake-btn{padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;flex:1;min-height:36px}
.stake-btn:active{border-color:var(--green);color:var(--green)}
.stake-input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:16px;font-weight:600;margin-bottom:10px;outline:none}
.stake-input:focus{border-color:var(--green)}
.calc-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px}
.calc-row span:first-child{color:var(--muted)}
.calc-row span:last-child{font-weight:600}
.risk-bar-wrap{margin:8px 0;padding:8px 10px;background:var(--bg3);border-radius:8px}
.risk-label{font-size:10px;color:var(--muted);margin-bottom:5px;display:flex;justify-content:space-between}
.risk-bar{height:6px;border-radius:3px;background:linear-gradient(to right,var(--green),var(--yellow),var(--red));position:relative}
.risk-pointer{width:10px;height:10px;border-radius:50%;background:#fff;position:absolute;top:50%;transform:translate(-50%,-50%);transition:left .3s;box-shadow:0 0 5px rgba(255,255,255,.5)}
.tp-actions{display:flex;gap:6px;margin-top:8px}
.tp-btn{flex:1;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--green),#00C853);color:#000;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;min-height:44px}
.tp-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
.tp-btn-exp{flex:1;padding:12px;border-radius:10px;border:1px solid var(--blue);background:transparent;color:var(--blue);font-size:13px;font-weight:700;cursor:pointer;min-height:44px}
.tp-btn-exp:disabled{border-color:var(--border);color:var(--muted);cursor:not-allowed}
.tp-btn-clear{width:100%;margin-top:6px;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;min-height:40px}

/* LOADER */
.loader{text-align:center;padding:40px;color:var(--muted)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-msg{font-size:12px;margin-top:5px;color:var(--muted)}
.status-msg{text-align:center;padding:30px 16px}
.status-msg .icon{font-size:30px;margin-bottom:8px}
.status-msg h3{font-size:14px;font-weight:700;margin-bottom:5px}
.status-msg p{font-size:12px;color:var(--muted);line-height:1.5}
.retry-btn{margin-top:10px;padding:8px 18px;border-radius:10px;border:1px solid var(--green);background:transparent;color:var(--green);font-size:12px;font-weight:600;cursor:pointer;min-height:40px}

/* HISTORY */
.hist-stats{display:flex;gap:6px;padding:12px 0 8px;flex-wrap:wrap}
.stat-box{flex:1;min-width:80px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 10px;text-align:center}
.stat-val{font-size:18px;font-weight:800;color:var(--green)}
.stat-val.red{color:var(--red)}.stat-val.blue{color:var(--blue)}
.stat-label{font-size:10px;color:var(--muted);margin-top:2px}
.hist-empty{text-align:center;padding:40px;color:var(--muted)}
.hist-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.hist-hdr{padding:10px 14px;display:flex;align-items:center;gap:8px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:6px}
.hist-date{font-size:11px;color:var(--muted)}
.hist-odd{font-size:15px;font-weight:800;color:var(--blue);margin-left:auto}
.hist-stake{font-size:11px;color:var(--muted)}
.hist-result{font-size:11px;font-weight:700;padding:2px 7px;border-radius:7px}
.hist-result.won{background:rgba(0,230,118,.15);color:var(--green)}
.hist-result.lost{background:rgba(255,82,82,.15);color:var(--red)}
.hist-result.open{background:rgba(255,215,64,.15);color:var(--yellow)}
.hist-sels{padding:8px 14px}
.hist-sel{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.hist-sel:last-child{border-bottom:none}
.hist-sel-name{color:var(--muted);flex:1;margin-right:8px}
.hist-sel-odd{color:var(--blue);font-weight:700}
.hist-footer{padding:8px 14px;background:var(--bg3);display:flex;justify-content:space-between;align-items:center;font-size:12px}
.hist-actions{display:flex;gap:5px;padding:8px 14px 10px;flex-wrap:wrap}
.hist-btn{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;min-height:36px}
.hist-btn.won-btn{border-color:rgba(0,230,118,.3);color:var(--green)}
.hist-btn.lost-btn{border-color:rgba(255,82,82,.3);color:var(--red)}
.hist-btn.del{border-color:rgba(255,82,82,.3);color:var(--red)}
.hist-btn.export-btn{border-color:rgba(41,121,255,.3);color:var(--blue)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:360px;max-width:100%;overflow:hidden}
.modal-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-hdr h3{font-size:14px;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px;min-width:36px;min-height:36px}
.ticket-preview{padding:14px 18px}
.ticket-preview img{width:100%;border-radius:8px}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px}
.modal-btn{flex:1;padding:10px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;min-height:44px}
.modal-btn.primary{background:linear-gradient(135deg,var(--green),#00C853);color:#000}
.modal-btn.secondary{background:var(--bg3);border:1px solid var(--border);color:var(--muted)}

/* SQUADS LOADING */
.squad-loading{font-size:10px;color:var(--muted);padding:8px;text-align:center;font-style:italic}

/* LEAGUE ACCENTS */
.lc-PL{border-left:3px solid #3d195b}.lc-PD{border-left:3px solid #c8102e}.lc-BL1{border-left:3px solid #d20515}
.lc-SA{border-left:3px solid #024494}.lc-FL1{border-left:3px solid #003189}.lc-PPL{border-left:3px solid #006600}
.lc-CL{border-left:3px solid #1a56db}.lc-EC{border-left:3px solid #003399}
.lc-L1R{border-left:3px solid #ffcc00}.lc-BEL{border-left:3px solid #eb1c24}
</style>
</head>
<body>
<div class="app">

<div class="hdr">
  <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="12" r="10" stroke="#00E676" stroke-width="1.5"/>
    <path d="M2 12h20M12 2c0 0-4 4-4 10s4 10 4 10" stroke="#00E676" stroke-width="1" opacity=".5"/>
    <circle cx="12" cy="12" r="3" fill="#00E676"/>
  </svg>
  <div><h1>Football Intelligence</h1><p>Predicții bazate pe statistici reale 2025-26</p></div>
  <div class="hdr-right"><span class="cache-badge" id="cacheBadge">cache: 0 zile</span></div>
</div>

<div class="nav-tabs">
  <button class="nav-tab active" onclick="switchTab('matches')">⚽ Meciuri</button>
  <button class="nav-tab" onclick="switchTab('history')">📋 Istoric</button>
</div>

<div class="tab-content active" id="tab-matches">
  <div class="days" id="dayBar"></div>
  <div class="leagues" id="lgBar"></div>
  <div class="filters" id="filterBar"></div>
  <div class="main">
    <div class="matches-col" id="matchesCol"><div class="loader"><div class="spinner"></div><p>Se încarcă...</p></div></div>
    <div class="ticket-panel" id="ticketPanel"></div>
  </div>
</div>

<div class="tab-content" id="tab-history">
  <div class="hist-stats" id="histStats"></div>
  <div id="histList"></div>
</div>

</div><!-- /app -->

<!-- MOBILE BOTTOM BAR -->
<div class="mobile-ticket-bar" id="mobileBar">
  <div class="mtb-info">
    <div class="mtb-count" id="mtbCount">0 selecții</div>
    <div class="mtb-odd" id="mtbOdd">@1.00</div>
  </div>
  <button class="mtb-open" onclick="openDrawer()">📋 Bilet</button>
  <button class="mtb-btn" id="mtbSave" disabled onclick="saveTicket()">💾 Salvează</button>
</div>

<!-- MOBILE TICKET DRAWER -->
<div class="ticket-drawer" id="ticketDrawer">
  <div class="td-hdr">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00E676" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>
    <h2>Bilet de Pariuri</h2>
    <span id="drawerCnt" style="font-size:11px;color:var(--muted)">0/8</span>
    <button class="td-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="td-body" id="drawerBody"></div>
  <div class="td-footer" id="drawerFooter"></div>
</div>

<!-- EXPORT MODAL -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <div class="modal-hdr"><h3>📤 Export Bilet</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="ticket-preview" id="ticketPreview"></div>
    <div class="modal-footer">
      <button class="modal-btn secondary" onclick="closeModal()">Închide</button>
      <button class="modal-btn primary" onclick="downloadTicket()">⬇ Descarcă PNG</button>
    </div>
  </div>
</div>
<canvas id="ticketCanvas" style="display:none"></canvas>

<script src="data.js"></script>
<script>
const PROXY='https://football-proxy-weld.vercel.app';
const FD_LEAGUES=['PL','PD','BL1','SA','FL1','PPL','CL','EC'];
const AF_LEAGUES=[{id:283,name:'Liga 1',code:'L1R'},{id:144,name:'Pro League',code:'BEL'}];
const CACHE_TTL=5*60*1000;
const LS_HISTORY='fi_history_v1';
const AF_TEAM_IDS={
  'Arsenal':42,'Chelsea':49,'Liverpool':40,'Manchester City':50,'Manchester United':33,
  'Tottenham':47,'Newcastle':34,'Aston Villa':66,'West Ham':48,'Brighton':51,
  'Fulham':36,'Brentford':55,'Nottingham Forest':65,'Nottm Forest':65,'Bournemouth':35,

/* ── SQUADS FROM API ── */
async function fetchSquad(teamName){
  if(squadCache[teamName])return squadCache[teamName];
  const tid=AF_TEAM_IDS[teamName];
  if(!tid)return PLAYERS[teamName]||null;
  try{
    const season=getAFSeason();
    const r=await fetch(PROXY+'/api/proxy?path=players/squads&team='+tid+'&season='+season);
    const d=await r.json();
    if(d.response&&d.response[0]){
      const players=d.response[0].players
        .filter(p=>['Goalkeeper','Defender','Midfielder','Attacker'].includes(p.position))
        .sort((a,b)=>{
          const order={Goalkeeper:0,Defender:1,Midfielder:2,Attacker:3};
          return order[a.position]-order[b.position];
        })
        .slice(0,15)
        .map(p=>p.name.split(' ').pop()); // Last name
      squadCache[teamName]=players;
      return players;
    }
  }catch(e){console.warn('Squad fetch failed',teamName,e);}
  return PLAYERS[teamName]||null;
}

function histLoad(){try{return JSON.parse(localStorage.getItem(LS_HISTORY)||'[]');}catch{return[];}}

function histAdd(ticket,stake,totalOdd){

/* ── STATS / ODDS ── */
function getS(t){return TEAM_STATS[t]||{gf:1.4,ga:1.2,o25:50,btts:48,cf:5.0,ca:4.5,sf:50,form:'UUUUU'};}
function calcOdd(p,m=0.10){return Math.max(1.05,+((1/Math.max(0.05,Math.min(0.95,p/100)))*(1+m)).toFixed(2));}
function probs(h,a){
  const hs=getS(h),as=getS(a);
  const hAtt=(hs.gf+as.ga)/2,aAtt=(as.gf+hs.ga)/2,tot=hAtt+aAtt;
  const fScore=s=>[...s].reduce((acc,c)=>acc+(c==='W'?1:c==='D'?0.4:0),0)/s.length;
  const hFm=fScore(hs.form||'UUU'),aFm=fScore(as.form||'UUU');
  let hW=Math.round(Math.min(74,Math.max(18,((hAtt/tot)+0.07+(hFm-aFm)*0.05)*100)));
  let aW=Math.round(Math.min(72,Math.max(10,((aAtt/tot)-0.07+(aFm-hFm)*0.05)*100)));
  let dr=Math.max(14,100-hW-aW);
  const s=hW+aW+dr; hW=Math.round(hW/s*100); aW=Math.round(aW/s*100); dr=100-hW-aW;
  const expG=hAtt+aAtt;
  const o25=Math.round(Math.min(84,(hs.o25+as.o25)/2+expG*2-2));
  const o35=Math.round(Math.min(68,o25-18));
  const o45=Math.max(8,o35-20);
  const o15=Math.round(Math.min(91,o25+18));
  const bt=Math.round(Math.min(77,(hs.btts+as.btts)/2));
  const hC=+((hs.cf+as.ca)/2).toFixed(1);
  const aC=+((as.cf+hs.ca)/2).toFixed(1);
  return {hW,aW,dr,o15,o25,o35,o45,bt,nobt:100-bt,hC,aC,totC:+(hC+aC).toFixed(1)};
}

/* ── LOAD MATCHES ── */
async function loadMatches(){
  const date=dayDate(state.day);
  const cached=cGet(date);
  if(cached){allMatches=cached;renderMatches();return;}
  const col=document.getElementById('matchesCol');
  const total=FD_LEAGUES.length+AF_LEAGUES.length;
  let loaded=0;
  col.innerHTML=`<div class="loader"><div class="spinner"></div><p>Se încarcă meciurile...</p><div class="loader-msg" id="loaderMsg">0 / ${total} ligi</div></div>`;
  const list=[];
  for(const lg of FD_LEAGUES){
    try{
      let r=await fetch(PROXY+'/api/fd?path=matches&competitions='+lg+'&dateFrom='+date+'&dateTo='+date);
      if(r.status===429){await new Promise(res=>setTimeout(res,3000));r=await fetch(PROXY+'/api/fd?path=matches&competitions='+lg+'&dateFrom='+date+'&dateTo='+date);}
      const d=await r.json();
      if(d.matches)list.push(...d.matches.map(m=>({...m,leagueCode:lg})));
    }catch(e){console.warn(lg,e);}
    loaded++;
    const msg=document.getElementById('loaderMsg');
    if(msg)msg.textContent=loaded+' / '+total+' ligi procesate';
    await new Promise(res=>setTimeout(res,700));
  }
  for(const lg of AF_LEAGUES){
    try{
      const r=await fetch(PROXY+'/api/proxy?path=fixtures&league='+lg.id+'&season='+getAFSeason()+'&date='+date);
      const d=await r.json();
      if(d.response)list.push(...d.response.map(m=>({
        id:m.fixture.id,utcDate:m.fixture.date,
        status:{code:m.fixture.status.short,elapsed:m.fixture.status.elapsed},
        homeTeam:{name:m.teams.home.name},awayTeam:{name:m.teams.away.name},
        score:{fullTime:{home:m.goals.home,away:m.goals.away}},
        leagueCode:lg.code,leagueName:lg.name
      })));
    }catch(e){console.warn(lg.id,e);}
    loaded++;
    const msg=document.getElementById('loaderMsg');
    if(msg)msg.textContent=loaded+' / '+total+' ligi procesate';
  }
  cSet(date,list);allMatches=list;renderMatches();
}

function toggleSel(mid,home,away,label,prob,odd){
  const idx=state.ticket.findIndex(t=>t.matchId===mid&&t.label===label);
  if(idx>=0){state.ticket.splice(idx,1);}
  else{
    if(state.ticket.length>=8){alert('Maximum 8 selecții!');return;}
    state.ticket.push({matchId:mid,home,away,label,prob,odd,dayLabel:dayLabel(state.day)});
  }
  const card=document.getElementById('mc-'+mid);
  if(card){
    card.querySelectorAll('.odd-btn').forEach(btn=>{
      const lbl=btn.querySelector('.odd-label')?.textContent?.replace('★ ','').replace('★','').trim();
      if(!lbl)return;
      const sel=isSel(mid,lbl);
      btn.classList.toggle('selected',sel);

      if(sel&&mCnt(mid)>=2){if(!bb){bb=document.createElement('span');bb.className='bb-badge';bb.textContent='BB';btn.prepend(bb);}}

    });

}

function renderTicket(){
  const t=state.ticket,sk=state.stake;
  const tOdd=t.length?+t.reduce((a,s)=>a*s.odd,1).toFixed(2):1;
  const win=+(sk*tOdd).toFixed(2);
  const profit=+(win-sk).toFixed(2);
  const eProb=t.length?+(t.reduce((a,s)=>a*(s.prob/100),1)*100).toFixed(1):0;
  const rPct=Math.min(100,Math.round((Math.log(Math.max(1.01,tOdd))/Math.log(50))*100));

  // Desktop panel
  document.getElementById('ticketPanel').innerHTML=`<div class="tp">
    <div class="tp-hdr">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00E676" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>
      <h2>Bilet de Pariuri</h2>
      <div class="tp-cnt">Selecții: <span>${t.length}/8</span></div>
    </div>
    ${ticketSelectionsHTML()}
    ${ticketCalcHTML(tOdd,win,profit,eProb,rPct,sk)}
  </div>`;

  // Mobile drawer
  document.getElementById('drawerCnt').textContent=t.length+'/8';
  document.getElementById('drawerBody').innerHTML=ticketSelectionsHTML();
  document.getElementById('drawerFooter').innerHTML=ticketCalcHTML(tOdd,win,profit,eProb,rPct,sk);
}

/* ── MOBILE BAR ── */
function updateMobileBar(){
  const t=state.ticket;
  const tOdd=t.length?+t.reduce((a,s)=>a*s.odd,1).toFixed(2):1;
  document.getElementById('mtbCount').textContent=t.length+' selecț'+(t.length===1?'ie':'ii');
  document.getElementById('mtbOdd').textContent='@'+tOdd;
  document.getElementById('mtbSave').disabled=t.length<2;
  const bar=document.getElementById('mobileBar');
  bar.classList.toggle('has-selections',t.length>0);
}

function openDrawer(){document.getElementById('ticketDrawer').classList.add('open');document.body.style.overflow='hidden';}
function closeDrawer(){document.getElementById('ticketDrawer').classList.remove('open');document.body.style.overflow='';}

function setStake(v){state.stake=v;const i=document.getElementById('stakeInp');if(i)i.value=v;renderTicket();updateMobileBar();}
function clearTicket(){
  if(!confirm('Golești biletul?'))return;
  state.ticket=[];renderTicket();updateMobileBar();
  document.querySelectorAll('.odd-btn.selected').forEach(b=>{b.classList.remove('selected');const bb=b.querySelector('.bb-badge');if(bb)bb.remove();});
}
function forceReload(){delete cache[cKey(dayDate(state.day))];filterBarBuilt=false;renderAll();}
function saveTicket(){
  const t=state.ticket;if(t.length<2)return;
  histAdd(t,state.stake,+t.reduce((a,s)=>a*s.odd,1).toFixed(2));
  closeDrawer();
  alert('Bilet salvat în Istoric! ✓');
}

/* ── EXPORT PNG ── */
let exportDataURL=null;
function exportTicket(entryId=null){
  let t=state.ticket,sk=state.stake,tOdd,date='';
  if(entryId){const h=histLoad();const e=h.find(x=>x.id===entryId);if(!e)return;t=e.selections;sk=e.stake;tOdd=e.totalOdd;date=e.date;}
  else{if(!t.length)return;tOdd=+t.reduce((a,s)=>a*s.odd,1).toFixed(2);date=new Date().toLocaleDateString('ro-RO');}
  const win=+(sk*tOdd).toFixed(2);
  const canvas=document.getElementById('ticketCanvas');
  const ctx=canvas.getContext('2d');
  const W=520,rowH=44,headerH=100,footerH=90,pad=20;
  canvas.width=W;canvas.height=headerH+t.length*rowH+footerH+pad;
  ctx.fillStyle='#0f0f0f';ctx.fillRect(0,0,W,canvas.height);
  const grad=ctx.createLinearGradient(0,0,W,0);
  grad.addColorStop(0,'#00E676');grad.addColorStop(1,'#00C853');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,headerH);
  ctx.fillStyle='#000';ctx.font='bold 20px sans-serif';ctx.fillText('⚽ Football Intelligence',pad,36);
  ctx.font='12px sans-serif';ctx.fillText('Bilet — '+date,pad,56);
  ctx.font='bold 17px sans-serif';ctx.fillText('Cotă totală: @'+tOdd+'  |  Miză: '+sk+' RON',pad,80);
  t.forEach((s,i)=>{
    const y=headerH+i*rowH;
    ctx.fillStyle=i%2===0?'#141414':'#111';ctx.fillRect(0,y,W,rowH);
    ctx.fillStyle='#f0f0f0';ctx.font='bold 12px sans-serif';ctx.fillText(s.home+' vs '+s.away,pad,y+15);
    ctx.fillStyle='#888';ctx.font='11px sans-serif';ctx.fillText(s.label,pad,y+30);
    ctx.fillStyle='#2979FF';ctx.font='bold 14px sans-serif';ctx.fillText('@'+s.odd,W-pad-40,y+22);
  });
  const fY=headerH+t.length*rowH+pad;
  ctx.fillStyle='#1a1a1a';ctx.fillRect(0,fY-pad,W,footerH+pad);
  ctx.fillStyle='#00E676';ctx.font='bold 18px sans-serif';ctx.fillText('Câștig potențial: '+win.toLocaleString('ro-RO')+' RON',pad,fY+30);
  ctx.fillStyle='#444';ctx.font='10px sans-serif';ctx.fillText('football-proxy-weld.vercel.app',pad,fY+55);
  exportDataURL=canvas.toDataURL('image/png');
  const img=document.createElement('img');img.src=exportDataURL;
  const prev=document.getElementById('ticketPreview');prev.innerHTML='';prev.appendChild(img);
  closeDrawer();
  document.getElementById('exportModal').classList.add('open');
}
function downloadTicket(){if(!exportDataURL)return;const a=document.createElement('a');a.href=exportDataURL;a.download='bilet-fi-'+Date.now()+'.png';a.click();closeModal();}
function closeModal(){document.getElementById('exportModal').classList.remove('open');exportDataURL=null;}

/* ── HISTORY ── */
function renderHistory(){
  const h=histLoad();
  const won=h.filter(x=>x.result==='won').length;
  const lost=h.filter(x=>x.result==='lost').length;
  const profit=h.filter(x=>x.result==='won').reduce((a,x)=>a+x.potential,0)-h.filter(x=>x.result!=='open').reduce((a,x)=>a+x.stake,0);
  const totalStake=h.reduce((a,x)=>a+x.stake,0);
  const roi=totalStake>0?((profit/totalStake)*100).toFixed(1):0;
  document.getElementById('histStats').innerHTML=`
    <div class="stat-box"><div class="stat-val">${h.length}</div><div class="stat-label">Bilete</div></div>
    <div class="stat-box"><div class="stat-val">${won}</div><div class="stat-label">Câștigate</div></div>
    <div class="stat-box"><div class="stat-val red">${lost}</div><div class="stat-label">Pierdute</div></div>
    <div class="stat-box"><div class="stat-val blue">${h.filter(x=>x.result==='open').length}</div><div class="stat-label">Deschise</div></div>
    <div class="stat-box"><div class="stat-val ${profit>=0?'':'red'}">${profit>=0?'+':''}${profit.toFixed(0)} RON</div><div class="stat-label">Profit</div></div>
    <div class="stat-box"><div class="stat-val ${roi>=0?'':'red'}">${roi}%</div><div class="stat-label">ROI</div></div>`;
  if(!h.length){document.getElementById('histList').innerHTML=`<div class="hist-empty"><div style="font-size:32px">📋</div><p style="margin-top:8px">Niciun bilet salvat încă.</p></div>`;return;}
  document.getElementById('histList').innerHTML=h.map(e=>`
    <div class="hist-card">
      <div class="hist-hdr">
        <div><div style="font-size:12px;font-weight:700">${e.selections.length} selecții</div><div class="hist-date">${e.date}</div></div>
        <span class="hist-odd">@${e.totalOdd}</span>
        <span class="hist-stake">${e.stake} RON</span>
        <span class="hist-result ${e.result}">${e.result==='won'?'✓ CÂȘTIGAT':e.result==='lost'?'✗ PIERDUT':'⏳ DESCHIS'}</span>
      </div>
      <div class="hist-sels">${e.selections.map(s=>`<div class="hist-sel"><span class="hist-sel-name">${s.home} vs ${s.away} — ${s.label}</span><span class="hist-sel-odd">@${s.odd}</span></div>`).join('')}</div>
      <div class="hist-footer"><span>Câștig: <strong style="color:var(--green)">${e.potential.toLocaleString('ro-RO')} RON</strong></span><span style="color:var(--muted)">Miză: ${e.stake} RON</span></div>
      <div class="hist-actions">
        ${e.result==='open'?`<button class="hist-btn won-btn" onclick="markResult(${e.id},'won')">✓ Câștigat</button><button class="hist-btn lost-btn" onclick="markResult(${e.id},'lost')">✗ Pierdut</button>`:`<button class="hist-btn" onclick="markResult(${e.id},'open')">↺ Reset</button>`}
        <button class="hist-btn export-btn" onclick="exportTicket(${e.id})">📤 PNG</button>
        <button class="hist-btn del" onclick="deleteTicket(${e.id})">🗑</button>
      </div>
    </div>`).join('');
}
function markResult(id,result){histSetResult(id,result);renderHistory();}
function deleteTicket(id){if(confirm('Ștergi biletul?')){histDelete(id);renderHistory();}}

async function renderAll(){buildDayBar();renderTicket();updateMobileBar();await loadMatches();}
renderAll();
</script>
