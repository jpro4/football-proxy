<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Intelligence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080808;--bg2:#111;--bg3:#1a1a1a;--card:#141414;--card2:#1e1e1e;--green:#00E676;--blue:#2979FF;--red:#FF5252;--yellow:#FFD740;--text:#f0f0f0;--muted:#888;--border:#2a2a2a}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1400px;margin:0 auto;padding:0 12px}
.hdr{background:linear-gradient(135deg,#0a0a0a,#141414);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.hdr-logo{display:flex;align-items:center;gap:8px}
.hdr h1{font-size:20px;font-weight:700;color:var(--green);letter-spacing:-0.5px}
.hdr p{font-size:11px;color:var(--muted);margin-top:2px}
.days{display:flex;gap:6px;padding:14px 0 10px;overflow-x:auto;scrollbar-width:none}
.days::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.day-btn:hover{border-color:#444;color:var(--text)}
.day-btn.active{background:linear-gradient(135deg,#00E676,#00C853);color:#000;border-color:transparent;box-shadow:0 0 16px rgba(0,230,118,.3)}
.leagues{display:flex;gap:6px;flex-wrap:wrap;padding:8px 0 12px}
.lg-btn{padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px}
.lg-btn:hover{border-color:#555;color:var(--text)}
.lg-btn.active{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.08)}
.lg-cnt{background:var(--border);color:var(--muted);border-radius:10px;padding:1px 5px;font-size:10px}
.lg-btn.active .lg-cnt{background:rgba(0,230,118,.2);color:var(--green)}
.main{display:flex;gap:16px;align-items:flex-start;padding-bottom:40px}
.matches-col{flex:1;min-width:0}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.match-card:hover{border-color:#333}
.mc-hdr{padding:10px 14px;display:flex;align-items:center;gap:10px}
.mc-league{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--muted);flex:1}
.mc-status-ft{font-size:10px;font-weight:700;color:var(--muted);background:var(--bg3);padding:2px 7px;border-radius:8px}
.mc-status-live{font-size:10px;font-weight:700;color:var(--red);display:flex;align-items:center;gap:4px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulse 1.2s infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.mc-teams{padding:12px 14px 8px;display:flex;align-items:center;gap:8px}
.mc-team{flex:1;font-size:14px;font-weight:600}
.mc-team.away{text-align:right}
.mc-score{font-size:22px;font-weight:800;color:var(--text);text-align:center;min-width:60px;letter-spacing:2px}
.mc-score.ns{font-size:13px;color:var(--muted);letter-spacing:0;font-weight:500}
.mc-cats{padding:0 14px 14px}
.cat-section{margin-top:8px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.cat-title{padding:8px 12px;background:var(--bg2);display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;user-select:none}
.cat-title:hover{background:#1a1a1a}
.cat-body{padding:8px;display:none}
.cat-body.open{display:block}
.odds-grid{display:flex;flex-wrap:wrap;gap:6px}
.odd-btn{flex:1;min-width:130px;max-width:220px;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;transition:all .2s;text-align:left;position:relative}
.odd-btn:hover{border-color:#444;background:#222}
.odd-btn.selected{border-color:var(--green);background:rgba(0,230,118,.1)}
.odd-label{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:4px}
.odd-val{font-size:16px;font-weight:700;color:var(--blue)}
.odd-prob{font-size:10px;margin-top:3px}
.prob-bar{height:3px;border-radius:2px;margin-top:4px;background:var(--border);overflow:hidden}
.prob-fill{height:100%;border-radius:2px;transition:width .4s}
.star{color:var(--yellow)}
.bb-badge{position:absolute;top:4px;right:4px;background:var(--blue);color:#fff;font-size:9px;font-weight:700;padding:1px 4px;border-radius:4px}
.ticket-panel{width:310px;flex-shrink:0;position:sticky;top:72px}
.tp{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tp-hdr{padding:14px;background:linear-gradient(135deg,#141414,#1e1e1e);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.tp-hdr h2{font-size:14px;font-weight:700;flex:1}
.tp-cnt{font-size:11px;color:var(--muted)}
.tp-cnt span{color:var(--green);font-weight:700}
.tp-empty{padding:24px;text-align:center;color:var(--muted);font-size:12px}
.tp-sel-list{max-height:340px;overflow-y:auto}
.tp-sel{padding:8px 14px;border-bottom:1px solid var(--border)}
.tp-sel-match{font-size:10px;color:var(--muted);margin-bottom:2px;display:flex;align-items:center;gap:6px}
.tp-sel-label{font-size:12px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.tp-sel-odd{color:var(--blue);font-size:14px;font-weight:700}
.tp-sel-day{font-size:9px;background:var(--bg3);border:1px solid var(--border);padding:1px 6px;border-radius:8px;color:var(--muted)}
.tp-remove{background:none;border:none;color:#555;cursor:pointer;font-size:14px;padding:0 4px;line-height:1}
.tp-remove:hover{color:var(--red)}
.tp-calc{padding:14px;border-top:1px solid var(--border);background:var(--bg2)}
.stake-row{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.stake-btn{padding:4px 9px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.stake-btn:hover{border-color:var(--green);color:var(--green)}
.stake-input{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:14px;font-weight:600;margin-bottom:10px;outline:none}
.stake-input:focus{border-color:var(--green)}
.calc-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px}
.calc-row span:first-child{color:var(--muted)}
.calc-row span:last-child{font-weight:600}
.calc-total{color:var(--green)}
.risk-bar-wrap{margin:10px 0;padding:10px;background:var(--bg3);border-radius:8px}
.risk-label{font-size:10px;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between}
.risk-bar{height:6px;border-radius:3px;background:linear-gradient(to right,var(--green),var(--yellow),var(--red));position:relative}
.risk-pointer{width:10px;height:10px;border-radius:50%;background:#fff;position:absolute;top:50%;transform:translate(-50%,-50%);transition:left .3s;box-shadow:0 0 6px rgba(255,255,255,.5)}
.tp-btn{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--green),#00C853);color:#000;font-size:14px;font-weight:800;cursor:pointer;transition:all .2s;margin-top:10px;letter-spacing:.3px}
.tp-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
.tp-btn:not(:disabled):hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,230,118,.4)}
.loader{text-align:center;padding:40px;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.lc-PL{border-left:3px solid #3d195b}
.lc-PD{border-left:3px solid #c8102e}
.lc-BL1{border-left:3px solid #d20515}
.lc-SA{border-left:3px solid #024494}
.lc-FL1{border-left:3px solid #003189}
.lc-PPL{border-left:3px solid #006600}
.lc-CL{border-left:3px solid #001d6a}
.lc-EC{border-left:3px solid #003399}
.lc-L1R{border-left:3px solid #ffcc00}
.lc-BEL{border-left:3px solid #eb1c24}
.no-matches{text-align:center;padding:40px;color:var(--muted);font-size:14px}
@media(max-width:768px){.main{flex-direction:column}.ticket-panel{width:100%;position:static}}
</style>
</head>

function getStats(t){return TEAM_STATS[t]||{goalsFor:1.4,goalsAgainst:1.2,over25:50,btts:48,cornersFor:5.0,cornersAgainst:4.5,scoredFirst:50};}

function calcOdds(prob,margin=0.10){
  const p=Math.max(0.05,Math.min(0.95,prob/100));
  return Math.max(1.05,+((1/p)*(1+margin)).toFixed(2));
}

function matchProbs(h,a){
  const hs=getStats(h),as=getStats(a);
  const hAtt=(hs.goalsFor+as.goalsAgainst)/2;
  const aAtt=(as.goalsFor+hs.goalsAgainst)/2;
  const tot=hAtt+aAtt;
  const hStr=hAtt/tot, aStr=aAtt/tot;
  const homeAdv=0.07;
  let hW=Math.round(Math.min(74,Math.max(18,(hStr+homeAdv)*100)));
  let aW=Math.round(Math.min(72,Math.max(10,(aStr-homeAdv)*100)));
  let dr=Math.max(15,100-hW-aW);
  const s=hW+aW+dr;
  hW=Math.round(hW/s*100); aW=Math.round(aW/s*100); dr=100-hW-aW;
  const expG=hAtt+aAtt;
  const over25=Math.round(Math.min(85,(hs.over25+as.over25)/2+expG*2-2));
  const over35=Math.round(Math.min(70,over25-18));
  const over45=Math.max(8,over35-20);
  const over15=Math.round(Math.min(92,over25+18));
  const btts=Math.round(Math.min(78,(hs.btts+as.btts)/2));
  const hC=(hs.cornersFor+as.cornersAgainst)/2;
  const aC=(as.cornersFor+hs.cornersAgainst)/2;
  return {hW,aW,dr,over15,over25,over35,over45,btts,nobtts:100-btts,hC,aC,totC:+(hC+aC).toFixed(1)};
}

const state={day:0,league:'ALL',ticket:[],stake:100};
let allMatches=[];

function dayLabel(off){
  const d=new Date();d.setDate(d.getDate()+off);
  if(off===0)return 'Azi';
  if(off===1)return 'Mâine';
  return d.toLocaleDateString('ro-RO',{weekday:'short',day:'numeric',month:'numeric'}).replace('.','/');
}
function dayDate(off){const d=new Date();d.setDate(d.getDate()+off);return d.toISOString().split('T')[0];}

function buildDayBar(){
  const bar=document.getElementById('dayBar');
  bar.innerHTML='';
  for(let i=0;i<7;i++){
    const b=document.createElement('button');
    b.className='day-btn'+(i===state.day?' active':'');
    b.textContent=dayLabel(i);
    b.onclick=()=>{state.day=i;renderAll();};
    bar.appendChild(b);
  }
}

function buildLgBar(){
  const bar=document.getElementById('lgBar');
  bar.innerHTML='';
  const all=document.createElement('button');
  all.className='lg-btn'+(state.league==='ALL'?' active':'');
  all.innerHTML='Toate <span class="lg-cnt">'+allMatches.length+'</span>';
  all.onclick=()=>{state.league='ALL';renderMatches();};
  bar.appendChild(all);
  const seen=new Set();
  allMatches.forEach(m=>{
    if(!seen.has(m.leagueCode)){
      seen.add(m.leagueCode);
      const cnt=allMatches.filter(x=>x.leagueCode===m.leagueCode).length;
      const b=document.createElement('button');
      b.className='lg-btn'+(state.league===m.leagueCode?' active':'');
      const name=LG_NAMES[m.leagueCode]||m.leagueCode;
      b.innerHTML=name+' <span class="lg-cnt">'+cnt+'</span>';
      b.onclick=()=>{state.league=m.leagueCode;renderMatches();};
      bar.appendChild(b);
    }
  });
}

async function loadMatches(){
  document.getElementById('matchesCol').innerHTML='<div class="loader"><div class="spinner"></div><p>Se încarcă meciurile...</p></div>';
  const date=dayDate(state.day);
  const matches=[];

  for(const lg of FD_LEAGUES){
    try{
      const r=await fetch(PROXY+'/api/fd/v4/matches?competitions='+lg+'&dateFrom='+date+'&dateTo='+date);
      const d=await r.json();
      if(d.matches)matches.push(...d.matches.map(m=>({...m,leagueCode:lg,source:'fd'})));
      await new Promise(res=>setTimeout(res,700));
    }catch(e){console.warn('FD error',lg,e);}
  }

  for(const lg of AF_LEAGUES){
    try{
      const r=await fetch(PROXY+'/api/proxy?path=fixtures&league='+lg.id+'&season=2025&date='+date);
      const d=await r.json();
      if(d.response)matches.push(...d.response.map(m=>({
        id:m.fixture.id,
        utcDate:m.fixture.date,
        status:{code:m.fixture.status.short,elapsed:m.fixture.status.elapsed},
        homeTeam:{name:m.teams.home.name},
        awayTeam:{name:m.teams.away.name},
        score:{fullTime:{home:m.goals.home,away:m.goals.away}},
        leagueCode:lg.code,
        leagueName:lg.name,
        source:'af'
      })));
    }catch(e){console.warn('AF error',lg.id,e);}
  }

  allMatches=matches;
  renderMatches();
}

function statusDisplay(m){
  const s=m.status?.code||m.status?.short||'';
  if(['1H','2H','HT','LIVE'].includes(s)){
    const el=m.status?.elapsed?` ${m.status.elapsed}'`:'';
    return `<span class="mc-status-live"><span class="live-dot"></span>LIVE${el}</span>`;
  }
  if(s==='FT')return '<span class="mc-status-ft">FT</span>';
  if(s==='HT')return '<span class="mc-status-ft">Pauză</span>';
  return '';
}

function scoreDisplay(m){
  const s=m.status?.code||m.status?.short||'';
  const h=m.score?.fullTime?.home,a=m.score?.fullTime?.away;
  if(['FT','1H','2H','HT','LIVE'].includes(s)&&h!==null&&a!==null)
    return `<span class="mc-score">${h} - ${a}</span>`;
  const t=new Date(m.utcDate);
  return `<span class="mc-score ns">${t.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'})}</span>`;
}

function probColor(p){return p>=72?'var(--green)':p>=55?'var(--yellow)':'var(--red)';}

function isSelected(mid,lbl){return state.ticket.some(t=>t.matchId===mid&&t.label===lbl);}
function matchTicketCnt(mid){return state.ticket.filter(t=>t.matchId===mid).length;}

function oddBtn(mid,home,away,label,prob){
  const odd=calcOdds(prob);
  const sel=isSelected(mid,label);
  const mc=matchTicketCnt(mid);
  const isBB=sel&&mc>=2;
  const starMark=prob>=68?'<span class="star">★</span> ':'';
  const bb=isBB?'<span class="bb-badge">BB</span>':'';
  const col=probColor(prob);
  return `<button class="odd-btn${sel?' selected':''}" onclick="toggleSel('${mid}','${home.replace(/'/g,"\\'")}','${away.replace(/'/g,"\\'")}','${label.replace(/'/g,"\\'")}',${prob},${odd})">
    ${bb}
    <div class="odd-label">${starMark}${label}</div>
    <div class="odd-val">@${odd}</div>
    <div class="odd-prob" style="color:${col}">${prob}%</div>
    <div class="prob-bar"><div class="prob-fill" style="width:${prob}%;background:${col}"></div></div>
  </button>`;
}

function buildCard(m){
  const home=m.homeTeam.name,away=m.awayTeam.name;
  const mid=String(m.id);
  const p=matchProbs(home,away);
  const lgName=LG_NAMES[m.leagueCode]||m.leagueName||m.leagueCode;

  const sec1X2=`<div class="cat-section">
    <div class="cat-title" onclick="toggleCat(this)">1X2 &amp; Șanse<span>▼</span></div>
    <div class="cat-body">
      <div class="odds-grid">
        ${oddBtn(mid,home,away,'1 '+home,p.hW)}
        ${oddBtn(mid,home,away,'X Egal',p.dr)}
        ${oddBtn(mid,home,away,'2 '+away,p.aW)}
        ${oddBtn(mid,home,away,'1X',Math.min(94,p.hW+p.dr))}
        ${oddBtn(mid,home,away,'X2',Math.min(94,p.aW+p.dr))}
      </div>
    </div>
  </div>`;

  const secGoluri=`<div class="cat-section">
    <div class="cat-title" onclick="toggleCat(this)">⚽ Goluri<span>▼</span></div>
    <div class="cat-body">
      <div class="odds-grid">
        ${oddBtn(mid,home,away,'Peste 1.5',p.over15)}
        ${oddBtn(mid,home,away,'Peste 2.5',p.over25)}
        ${oddBtn(mid,home,away,'Peste 3.5',p.over35)}
        ${oddBtn(mid,home,away,'Peste 4.5',p.over45)}
        ${oddBtn(mid,home,away,'BTTS Da',p.btts)}
        ${oddBtn(mid,home,away,'BTTS Nu',p.nobtts)}
      </div>
    </div>
  </div>`;

  const secCornere=`<div class="cat-section">
    <div class="cat-title" onclick="toggleCat(this)">📐 Cornere<span>▼</span></div>
    <div class="cat-body">
      <div class="odds-grid">
        ${oddBtn(mid,home,away,'Total >7.5',p.totC>9?65:52)}
        ${oddBtn(mid,home,away,'Total >9.5',p.totC>10?56:43)}
        ${oddBtn(mid,home,away,'Total >11.5',p.totC>11?46:34)}
        ${oddBtn(mid,home,away,home+' >3.5',p.hC>5?62:48)}
        ${oddBtn(mid,home,away,away+' >3.5',p.aC>5?60:46)}
      </div>
    </div>
  </div>`;

  const hp=PLAYERS[home],ap=PLAYERS[away];
  const secSuturi=hp&&ap?`<div class="cat-section">
    <div class="cat-title" onclick="toggleCat(this)">🎯 Suturi pe Poartă<span>▼</span></div>
    <div class="cat-body">
      <div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:6px">${home}</div>
      <div class="odds-grid">${hp.slice(0,4).map((pl,i)=>oddBtn(mid,home,away,pl+' suturi',28+((i*7+p.hW)%25))).join('')}</div>
      <div style="font-size:10px;color:var(--muted);font-weight:700;margin:8px 0 6px">${away}</div>
      <div class="odds-grid">${ap.slice(0,4).map((pl,i)=>oddBtn(mid,home,away,pl+' suturi',24+((i*7+p.aW)%25))).join('')}</div>
    </div>
  </div>`:'';

  return `<div class="match-card lc-${m.leagueCode}" id="mc-${mid}">
    <div class="mc-hdr">
      <span class="mc-league">${lgName.toUpperCase()}</span>
      ${statusDisplay(m)}
    </div>
    <div class="mc-teams">
      <div class="mc-team">${home}</div>
      ${scoreDisplay(m)}
      <div class="mc-team away">${away}</div>
    </div>
    <div class="mc-cats">${sec1X2}${secGoluri}${secCornere}${secSuturi}</div>
  </div>`;
}

function toggleCat(title){
  const body=title.nextElementSibling;
  const tog=title.querySelector('span:last-child');
  const isOpen=body.classList.toggle('open');
  tog.textContent=isOpen?'▲':'▼';
}

function toggleSel(mid,home,away,label,prob,odd){
  const idx=state.ticket.findIndex(t=>t.matchId===mid&&t.label===label);
  if(idx>=0){
    state.ticket.splice(idx,1);
  } else {
    if(state.ticket.length>=8){alert('Maximum 8 selecții pe bilet!');return;}
    state.ticket.push({matchId:mid,home,away,label,prob,odd,day:state.day,dayLabel:dayLabel(state.day)});
  }
  // Refresh buttons in card
  const card=document.getElementById('mc-'+mid);
  if(card){
    card.querySelectorAll('.odd-btn').forEach(btn=>{
      const lbl=btn.querySelector('.odd-label')?.textContent?.replace('★ ','').replace('★','').trim();
      if(!lbl)return;
      const sel=isSelected(mid,lbl);
      btn.classList.toggle('selected',sel);
      let bb=btn.querySelector('.bb-badge');
      if(sel&&matchTicketCnt(mid)>=2){
        if(!bb){bb=document.createElement('span');bb.className='bb-badge';bb.textContent='BB';btn.prepend(bb);}
      } else if(bb)bb.remove();
    });
  }
  renderTicket();
}

function renderMatches(){
  buildDayBar();
  buildLgBar();
  const col=document.getElementById('matchesCol');
  const list=state.league==='ALL'?allMatches:allMatches.filter(m=>m.leagueCode===state.league);
  if(!list.length){col.innerHTML='<div class="no-matches">Nu există meciuri pentru această zi / ligă.</div>';return;}
  col.innerHTML=list.map(buildCard).join('');
}

function renderTicket(){
  const t=state.ticket;
  const stake=state.stake;
  const totalOdd=t.length?+t.reduce((a,s)=>a*s.odd,1).toFixed(2):1;
  const win=+(stake*totalOdd).toFixed(2);
  const profit=+(win-stake).toFixed(2);
  const estProb=t.length?+(t.reduce((a,s)=>a*(s.prob/100),1)*100).toFixed(1):0;
  const riskPct=Math.min(100,Math.round((Math.log(totalOdd)/Math.log(50))*100));

  const selsHTML=t.length===0?
    '<div class="tp-empty">Selectează cote din meciuri pentru a construi biletul</div>':
    `<div class="tp-sel-list">${t.map(s=>`<div class="tp-sel">
      <div class="tp-sel-match"><span class="tp-sel-day">${s.dayLabel}</span>${s.home} vs ${s.away}</div>
      <div class="tp-sel-label">
        <span>${s.label}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="tp-sel-odd">@${s.odd}</span>
          <button class="tp-remove" onclick="toggleSel('${s.matchId}','${s.home.replace(/'/g,"\\'")}','${s.away.replace(/'/g,"\\'")}','${s.label.replace(/'/g,"\\'")}',${s.prob},${s.odd})">✕</button>
        </div>
      </div>
    </div>`).join('')}</div>`;

  document.getElementById('ticketPanel').innerHTML=`<div class="tp">
    <div class="tp-hdr">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00E676" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>
      <h2>Bilet de Pariuri</h2>
      <div class="tp-cnt">Selecții: <span>${t.length}/8</span></div>
    </div>
    ${selsHTML}
    <div class="tp-calc">
      <div class="stake-row">
        ${[25,50,100,150,200].map(v=>`<button class="stake-btn" onclick="setStake(${v})">${v}</button>`).join('')}
      </div>
      <input class="stake-input" type="number" id="stakeInp" value="${stake}" min="1" placeholder="Miză (RON)" oninput="state.stake=+this.value||100;renderTicket()">
      <div class="calc-row"><span>Cotă totală</span><span style="color:var(--blue)">@${totalOdd}</span></div>
      <div class="calc-row"><span>Prob. estimată</span><span>${estProb}%</span></div>
      <div class="calc-row"><span>Câștig potențial</span><span class="calc-total">${win.toLocaleString('ro-RO')} RON</span></div>
      <div class="calc-row"><span>Profit net</span><span style="color:${profit>=0?'var(--green)':'var(--red)'}">+${profit.toLocaleString('ro-RO')} RON</span></div>
      <div class="risk-bar-wrap">
        <div class="risk-label"><span>Conservator</span><span>Agresiv</span></div>
        <div class="risk-bar"><div class="risk-pointer" style="left:${riskPct}%"></div></div>
      </div>
      <button class="tp-btn" ${t.length<2?'disabled':''} onclick="alert('Bilet gata!\\nCotă totală: @${totalOdd}\\nMiză: ${stake} RON\\nCâștig potențial: ${win} RON')">
        ${t.length<2?'Adaugă min. 2 selecții':'🎯 Bilet Gata — @'+totalOdd}
      </button>
    </div>
  </div>`;
}

function setStake(v){state.stake=v;document.getElementById('stakeInp')&&(document.getElementById('stakeInp').value=v);renderTicket();}

async function renderAll(){
  buildDayBar();
  renderTicket();
  await loadMatches();
}

renderAll();
