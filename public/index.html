<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Intelligence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080808;--bg2:#111;--bg3:#1a1a1a;--card:#141414;--green:#00E676;--blue:#2979FF;--red:#FF5252;--yellow:#FFD740;--text:#f0f0f0;--muted:#888;--border:#2a2a2a}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1400px;margin:0 auto;padding:0 12px}
.hdr{background:linear-gradient(135deg,#0a0a0a,#141414);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.hdr h1{font-size:20px;font-weight:700;color:var(--green);letter-spacing:-0.5px}
.hdr p{font-size:11px;color:var(--muted);margin-top:2px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.cache-badge{font-size:10px;color:var(--muted);background:var(--bg3);padding:3px 8px;border-radius:8px;border:1px solid var(--border)}
.cache-badge.hit{color:var(--green);border-color:rgba(0,230,118,.3)}
.days{display:flex;gap:6px;padding:14px 0 10px;overflow-x:auto;scrollbar-width:none}
.days::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;position:relative}
.day-btn:hover{border-color:#444;color:var(--text)}
.day-btn.active{background:linear-gradient(135deg,#00E676,#00C853);color:#000;border-color:transparent;box-shadow:0 0 16px rgba(0,230,118,.3)}
.day-btn.has-cache::after{content:'';position:absolute;top:4px;right:4px;width:5px;height:5px;border-radius:50%;background:var(--green)}
.leagues{display:flex;gap:6px;flex-wrap:wrap;padding:8px 0 12px}
.lg-btn{padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px}
.lg-btn:hover{border-color:#555;color:var(--text)}
.lg-btn.active{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.08)}
.lg-cnt{background:var(--border);color:var(--muted);border-radius:10px;padding:1px 5px;font-size:10px}
.lg-btn.active .lg-cnt{background:rgba(0,230,118,.2);color:var(--green)}
/* FILTERS */
.filters{display:flex;gap:6px;flex-wrap:wrap;padding:0 0 12px}
.filter-btn{padding:4px 11px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.filter-btn:hover{border-color:#555;color:var(--text)}
.filter-btn.active{border-color:var(--yellow);color:var(--yellow);background:rgba(255,215,64,.08)}
.main{display:flex;gap:16px;align-items:flex-start;padding-bottom:40px}
.matches-col{flex:1;min-width:0}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.match-card:hover{border-color:#333}
.mc-hdr{padding:10px 14px;display:flex;align-items:center;gap:10px}
.mc-league{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--muted);flex:1}
.mc-status-ft{font-size:10px;font-weight:700;color:var(--muted);background:var(--bg3);padding:2px 7px;border-radius:8px}
.mc-status-live{font-size:10px;font-weight:700;color:var(--red);display:flex;align-items:center;gap:4px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulse 1.2s infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.mc-teams{padding:12px 14px 8px;display:flex;align-items:center;gap:8px}
.mc-team{flex:1;font-size:14px;font-weight:600}
.mc-team.away{text-align:right}
.mc-score{font-size:22px;font-weight:800;color:var(--text);text-align:center;min-width:60px;letter-spacing:2px}
.mc-score.ns{font-size:13px;color:var(--muted);letter-spacing:0;font-weight:500}
/* FORM BADGES */
.mc-form{padding:0 14px 8px;display:flex;gap:8px}
.form-group{flex:1}
.form-label{font-size:9px;color:var(--muted);font-weight:700;margin-bottom:3px}
.form-dots{display:flex;gap:2px}
.fd{width:14px;height:14px;border-radius:3px;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#000}
.fd.W{background:var(--green)}
.fd.D{background:var(--yellow)}
.fd.L{background:var(--red)}
.fd.U{background:var(--border);color:var(--muted)}
.cat-section{margin-top:8px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.cat-title{padding:8px 12px;background:var(--bg2);display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;user-select:none}
.cat-title:hover{background:var(--bg3)}
.cat-body{padding:8px;display:none}
.cat-body.open{display:block}
.mc-cats{padding:0 14px 14px}
.odds-grid{display:flex;flex-wrap:wrap;gap:6px}
.odd-btn{flex:1;min-width:130px;max-width:220px;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;transition:all .2s;text-align:left;position:relative}
.odd-btn:hover{border-color:#444;background:#222}
.odd-btn.selected{border-color:var(--green);background:rgba(0,230,118,.1)}
.odd-label{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:4px}
.odd-val{font-size:16px;font-weight:700;color:var(--blue)}
.odd-prob{font-size:10px;margin-top:3px}
.prob-bar{height:3px;border-radius:2px;margin-top:4px;background:var(--border);overflow:hidden}
.prob-fill{height:100%;border-radius:2px;transition:width .4s}
.star{color:var(--yellow)}
.bb-badge{position:absolute;top:4px;right:4px;background:var(--blue);color:#fff;font-size:9px;font-weight:700;padding:1px 4px;border-radius:4px}
/* TICKET */
.ticket-panel{width:310px;flex-shrink:0;position:sticky;top:72px}
.tp{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tp-hdr{padding:14px;background:linear-gradient(135deg,#141414,#1e1e1e);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.tp-hdr h2{font-size:14px;font-weight:700;flex:1}
.tp-cnt{font-size:11px;color:var(--muted)}
.tp-cnt span{color:var(--green);font-weight:700}
.tp-empty{padding:24px;text-align:center;color:var(--muted);font-size:12px}
.tp-sel-list{max-height:340px;overflow-y:auto}
.tp-sel{padding:8px 14px;border-bottom:1px solid var(--border)}
.tp-sel-match{font-size:10px;color:var(--muted);margin-bottom:2px;display:flex;align-items:center;gap:6px}
.tp-sel-row{font-size:12px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.tp-sel-odd{color:var(--blue);font-size:14px;font-weight:700}
.tp-day{font-size:9px;background:var(--bg3);border:1px solid var(--border);padding:1px 6px;border-radius:8px;color:var(--muted)}
.tp-remove{background:none;border:none;color:#555;cursor:pointer;font-size:14px;padding:0 4px}
.tp-remove:hover{color:var(--red)}
.tp-calc{padding:14px;border-top:1px solid var(--border);background:var(--bg2)}
.stake-row{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.stake-btn{padding:4px 9px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.stake-btn:hover{border-color:var(--green);color:var(--green)}
.stake-input{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:14px;font-weight:600;margin-bottom:10px;outline:none}
.stake-input:focus{border-color:var(--green)}
.calc-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px}
.calc-row span:first-child{color:var(--muted)}
.calc-row span:last-child{font-weight:600}
.risk-bar-wrap{margin:10px 0;padding:10px;background:var(--bg3);border-radius:8px}
.risk-label{font-size:10px;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between}
.risk-bar{height:6px;border-radius:3px;background:linear-gradient(to right,var(--green),var(--yellow),var(--red));position:relative}
.risk-pointer{width:10px;height:10px;border-radius:50%;background:#fff;position:absolute;top:50%;transform:translate(-50%,-50%);transition:left .3s;box-shadow:0 0 6px rgba(255,255,255,.5)}
.tp-btn{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--green),#00C853);color:#000;font-size:14px;font-weight:800;cursor:pointer;transition:all .2s;margin-top:10px}
.tp-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
.tp-btn:not(:disabled):hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,230,118,.4)}
/* LOADER */
.loader{text-align:center;padding:40px;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-msg{font-size:12px;margin-top:6px;color:var(--muted)}
/* STATUS MESSAGES */
.status-msg{text-align:center;padding:32px 20px}
.status-msg .icon{font-size:32px;margin-bottom:10px}
.status-msg h3{font-size:15px;font-weight:700;margin-bottom:6px}
.status-msg p{font-size:12px;color:var(--muted);line-height:1.5}
.status-msg.error h3{color:var(--red)}
.status-msg.empty h3{color:var(--muted)}
.retry-btn{margin-top:12px;padding:8px 20px;border-radius:10px;border:1px solid var(--green);background:transparent;color:var(--green);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.retry-btn:hover{background:rgba(0,230,118,.1)}
/* LEAGUE ACCENTS */
.lc-PL{border-left:3px solid #3d195b}
.lc-PD{border-left:3px solid #c8102e}
.lc-BL1{border-left:3px solid #d20515}
.lc-SA{border-left:3px solid #024494}
.lc-FL1{border-left:3px solid #003189}
.lc-PPL{border-left:3px solid #006600}
.lc-CL{border-left:3px solid #1a56db}
.lc-EC{border-left:3px solid #003399}
.lc-L1R{border-left:3px solid #ffcc00}
.lc-BEL{border-left:3px solid #eb1c24}
.no-matches{text-align:center;padding:40px;color:var(--muted);font-size:14px}
@media(max-width:768px){.main{flex-direction:column}.ticket-panel{width:100%;position:static}}
</style>
</head>

function getS(t){return TEAM_STATS[t]||{gf:1.4,ga:1.2,o25:50,btts:48,cf:5.0,ca:4.5,sf:50,form:'UUUUU'};}
function calcOdd(p,m=0.10){return Math.max(1.05,+((1/Math.max(0.05,Math.min(0.95,p/100)))*(1+m)).toFixed(2));}

function probs(h,a){
  const hs=getS(h),as=getS(a);
  const hAtt=(hs.gf+as.ga)/2,aAtt=(as.gf+hs.ga)/2,tot=hAtt+aAtt;
  // form modifier
  const fScore=s=>[...s].reduce((acc,c)=>acc+(c==='W'?1:c==='D'?0.4:0),0)/s.length;
  const hFm=fScore(hs.form||'UUU'),aFm=fScore(as.form||'UUU');
  const homeAdv=0.07;
  let hW=Math.round(Math.min(74,Math.max(18,((hAtt/tot)+homeAdv+(hFm-aFm)*0.05)*100)));
  let aW=Math.round(Math.min(72,Math.max(10,((aAtt/tot)-homeAdv+(aFm-hFm)*0.05)*100)));
  let dr=Math.max(14,100-hW-aW);
  const s=hW+aW+dr; hW=Math.round(hW/s*100); aW=Math.round(aW/s*100); dr=100-hW-aW;
  const expG=hAtt+aAtt;
  const o25=Math.round(Math.min(84,(hs.o25+as.o25)/2+expG*2-2));
  const o35=Math.round(Math.min(68,o25-18));
  const o45=Math.max(8,o35-20);
  const o15=Math.round(Math.min(91,o25+18));
  const bt=Math.round(Math.min(77,(hs.btts+as.btts)/2));
  const hC=+((hs.cf+as.ca)/2).toFixed(1);
  const aC=+((as.cf+hs.ca)/2).toFixed(1);
  return {hW,aW,dr,o15,o25,o35,o45,bt,nobt:100-bt,hC,aC,totC:+(hC+aC).toFixed(1)};
}

function dayLabel(off){
  const d=new Date();d.setDate(d.getDate()+off);
  if(off===0)return 'Azi';if(off===1)return 'Mâine';
  return d.toLocaleDateString('ro-RO',{weekday:'short',day:'numeric',month:'numeric'}).replace('.','/');
}
function dayDate(off){const d=new Date();d.setDate(d.getDate()+off);return d.toISOString().split('T')[0];}

/* ── SMART SEASON DETECT ── */
function getActiveSeason(){
  const now=new Date();
  const m=now.getMonth()+1; // 1-12
  // Football season: Aug-May = current year starting Aug
  // Jun-Jul = off season, use previous season end
  if(m>=8)return now.getFullYear();
  return now.getFullYear()-1;
}
function getAFSeason(){
  // API-Football: Romania Liga1 2025 = season param 2025
  const yr=getActiveSeason();
  return yr; // e.g. 2025 for 2025-26 season
}

/* ── LOAD MATCHES ── */
async function loadMatches(){
  const date=dayDate(state.day);
  // Check cache first
  const cached=cacheGet(date);
  if(cached){
    allMatches=cached;
    renderMatches();
    return;
  }

  const col=document.getElementById('matchesCol');
  let loaded=0;
  const total=FD_LEAGUES.length+AF_LEAGUES.length;
  col.innerHTML=`<div class="loader"><div class="spinner"></div><p>Se încarcă meciurile...</p><div class="loader-msg" id="loaderMsg">0 / ${total} ligi</div></div>`;

  const list=[];
  let fdErrors=0;

  for(const lg of FD_LEAGUES){
    try{
      const r=await fetch(PROXY+'/api/fd?path=matches&competitions='+lg+'&dateFrom='+date+'&dateTo='+date);
      if(r.status===429){
        // Rate limited - wait and retry once
        await new Promise(res=>setTimeout(res,3000));
        const r2=await fetch(PROXY+'/api/fd?path=matches&competitions='+lg+'&dateFrom='+date+'&dateTo='+date);
        const d=await r2.json();
        if(d.matches)list.push(...d.matches.map(m=>({...m,leagueCode:lg})));
      } else {
        const d=await r.json();
        if(d.matches)list.push(...d.matches.map(m=>({...m,leagueCode:lg})));
        else if(d.errorCode)fdErrors++;
      }
    }catch(e){fdErrors++;console.warn(lg,e);}
    loaded++;
    const msg=document.getElementById('loaderMsg');
    if(msg)msg.textContent=loaded+' / '+total+' ligi procesate';
    await new Promise(res=>setTimeout(res,700));
  }

  for(const lg of AF_LEAGUES){
    try{
      const season=getAFSeason();
      const r=await fetch(PROXY+'/api/proxy?path=fixtures&league='+lg.id+'&season='+season+'&date='+date);
      const d=await r.json();
      if(d.response)list.push(...d.response.map(m=>({
        id:m.fixture.id,utcDate:m.fixture.date,
        status:{code:m.fixture.status.short,elapsed:m.fixture.status.elapsed},
        homeTeam:{name:m.teams.home.name},awayTeam:{name:m.teams.away.name},
        score:{fullTime:{home:m.goals.home,away:m.goals.away}},
        leagueCode:lg.code,leagueName:lg.name
      })));
    }catch(e){console.warn(lg.id,e);}
    loaded++;
    const msg=document.getElementById('loaderMsg');
    if(msg)msg.textContent=loaded+' / '+total+' ligi procesate';
  }

  // Cache results (even empty ones)
  cacheSet(date,list);
  allMatches=list;
  renderMatches();
}

/* ── STATUS / SCORE HTML ── */
function statusHTML(m){
  const s=m.status?.code||m.status?.short||'';
  if(['1H','2H','HT','LIVE'].includes(s))
    return `<span class="mc-status-live"><span class="live-dot"></span>LIVE${m.status?.elapsed?' '+m.status.elapsed+"'":''}</span>`;
  if(s==='FT')return '<span class="mc-status-ft">FT</span>';
  if(s==='HT')return '<span class="mc-status-ft">Pauză</span>';
  return '';
}

function scoreHTML(m){
  const s=m.status?.code||m.status?.short||'';
  const h=m.score?.fullTime?.home,a=m.score?.fullTime?.away;
  if(['FT','1H','2H','HT','LIVE'].includes(s)&&h!==null&&a!==null)
    return `<span class="mc-score">${h} - ${a}</span>`;
  const t=new Date(m.utcDate);
  return `<span class="mc-score ns">${t.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'})}</span>`;
}

/* ── ODDS ── */
function pColor(p){return p>=72?'var(--green)':p>=55?'var(--yellow)':'var(--red)';}
function isSel(mid,lbl){return state.ticket.some(t=>t.matchId===mid&&t.label===lbl);}
function mCnt(mid){return state.ticket.filter(t=>t.matchId===mid).length;}

function oBtn(mid,home,away,label,prob){
  const odd=calcOdd(prob);
  const sel=isSel(mid,label);
  const bb=sel&&mCnt(mid)>=2?'<span class="bb-badge">BB</span>':'';
  const star=prob>=68?'<span class="star">★</span> ':'';
  const col=pColor(prob);
  const esc=s=>s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
  return `<button class="odd-btn${sel?' selected':''}" onclick="toggleSel('${mid}','${esc(home)}','${esc(away)}','${esc(label)}',${prob},${odd})">
    ${bb}<div class="odd-label">${star}${label}</div>
    <div class="odd-val">@${odd}</div>
    <div class="odd-prob" style="color:${col}">${prob}%</div>
    <div class="prob-bar"><div class="prob-fill" style="width:${prob}%;background:${col}"></div></div>
  </button>`;
}

    <div class="cat-title" onclick="toggleCat(this)">1X2 &amp; Șanse<span>▼</span></div>
    <div class="cat-body"><div class="odds-grid">
      ${oBtn(mid,home,away,'1 '+home,p.hW)}
      ${oBtn(mid,home,away,'X Egal',p.dr)}
      ${oBtn(mid,home,away,'2 '+away,p.aW)}
      ${oBtn(mid,home,away,'1X',Math.min(94,p.hW+p.dr))}
      ${oBtn(mid,home,away,'X2',Math.min(94,p.aW+p.dr))}
    </div></div></div>`;

  const s2=`<div class="cat-section">
    <div class="cat-title" onclick="toggleCat(this)">⚽ Goluri<span>▼</span></div>
    <div class="cat-body"><div class="odds-grid">
      ${oBtn(mid,home,away,'Peste 1.5',p.o15)}
      ${oBtn(mid,home,away,'Peste 2.5',p.o25)}
      ${oBtn(mid,home,away,'Peste 3.5',p.o35)}
      ${oBtn(mid,home,away,'Peste 4.5',p.o45)}
      ${oBtn(mid,home,away,'BTTS Da',p.bt)}
      ${oBtn(mid,home,away,'BTTS Nu',p.nobt)}
    </div></div></div>`;

  const s3=`<div class="cat-section">
    <div class="cat-title" onclick="toggleCat(this)">📐 Cornere<span>▼</span></div>
    <div class="cat-body"><div class="odds-grid">
      ${oBtn(mid,home,away,'Total >7.5',p.totC>9?65:52)}
      ${oBtn(mid,home,away,'Total >9.5',p.totC>10?56:43)}
      ${oBtn(mid,home,away,'Total >11.5',p.totC>11?46:34)}
      ${oBtn(mid,home,away,home+' >3.5',p.hC>5?62:48)}
      ${oBtn(mid,home,away,away+' >3.5',p.aC>5?60:46)}
    </div></div></div>`;

  const s4=hp&&ap?`<div class="cat-section">
    <div class="cat-title" onclick="toggleCat(this)">🎯 Suturi pe Poartă<span>▼</span></div>
    <div class="cat-body">
      <div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:6px">${home}</div>
      <div class="odds-grid">${hp.slice(0,4).map((pl,i)=>oBtn(mid,home,away,pl+' suturi',28+((i*7+p.hW)%24))).join('')}</div>
      <div style="font-size:10px;color:var(--muted);font-weight:700;margin:8px 0 6px">${away}</div>
      <div class="odds-grid">${ap.slice(0,4).map((pl,i)=>oBtn(mid,home,away,pl+' suturi',24+((i*7+p.aW)%24))).join('')}</div>
    </div></div>`:'';

  return `<div class="match-card lc-${m.leagueCode}" id="mc-${mid}">
    <div class="mc-hdr"><span class="mc-league">${lgName.toUpperCase()}</span>${statusHTML(m)}</div>
    <div class="mc-teams">
      <div class="mc-team">${home}</div>${scoreHTML(m)}<div class="mc-team away">${away}</div>
    </div>
    <div class="mc-form">
      <div class="form-group"><div class="form-label">Formă ${home}</div><div class="form-dots">${formHTML(home)}</div></div>
      <div class="form-group" style="text-align:right"><div class="form-label">Formă ${away}</div><div class="form-dots" style="justify-content:flex-end">${formHTML(away)}</div></div>
    </div>
    <div class="mc-cats">${s1}${s2}${s3}${s4}</div>
  </div>`;
}

function toggleCat(title){
  const body=title.nextElementSibling;
  const tog=title.querySelector('span:last-child');
  tog.textContent=body.classList.toggle('open')?'▲':'▼';
}

/* ── FILTER LOGIC ── */
function applyFilter(list){
  if(state.filter==='ALL')return list;
  if(state.filter==='LIVE')return list.filter(m=>{
    const s=m.status?.code||m.status?.short||'';
    return ['1H','2H','HT','LIVE'].includes(s);
  });
  if(state.filter==='REC')return list.filter(m=>{
    const p=probs(m.homeTeam.name,m.awayTeam.name);
    return Math.max(p.hW,p.aW,p.o25,p.bt)>=65;
  });
  if(state.filter==='O25')return list.filter(m=>{
    const p=probs(m.homeTeam.name,m.awayTeam.name);
    return p.o25>=58;
  });
  if(state.filter==='BTTS')return list.filter(m=>{
    const p=probs(m.homeTeam.name,m.awayTeam.name);
    return p.bt>=58;
  });
  return list;
}

/* ── RENDER MATCHES ── */
function renderMatches(){
  buildDayBar();buildLgBar();buildFilterBar();
  const col=document.getElementById('matchesCol');
  let list=state.league==='ALL'?allMatches:allMatches.filter(m=>m.leagueCode===state.league);
  list=applyFilter(list);

  if(!allMatches.length){
    col.innerHTML=`<div class="status-msg empty">
      <div class="icon">📅</div>
      <h3>Nu există meciuri programate</h3>
      <p>Nu sunt meciuri disponibile pentru această dată în ligile monitorizate.<br>Încearcă o altă zi sau verifică mai târziu.</p>
      <button class="retry-btn" onclick="forceReload()">↺ Reîncearcă</button>
    </div>`;
    return;
  }
  if(!list.length){
    col.innerHTML=`<div class="status-msg empty">
      <div class="icon">🔍</div>
      <h3>Niciun meci nu corespunde filtrului</h3>
      <p>Încearcă să schimbi liga sau filtrul activ.</p>
    </div>`;
    return;
  }
  col.innerHTML=list.map(buildCard).join('');
}

/* ── TOGGLE SELECTION ── */
function toggleSel(mid,home,away,label,prob,odd){
  const idx=state.ticket.findIndex(t=>t.matchId===mid&&t.label===label);
  if(idx>=0){state.ticket.splice(idx,1);}
  else{
    if(state.ticket.length>=8){alert('Maximum 8 selecții!');return;}
    state.ticket.push({matchId:mid,home,away,label,prob,odd,dayLabel:dayLabel(state.day)});
  }
  const card=document.getElementById('mc-'+mid);
  if(card){
    card.querySelectorAll('.odd-btn').forEach(btn=>{
      const lbl=btn.querySelector('.odd-label')?.textContent?.replace('★ ','').replace('★','').trim();
      if(!lbl)return;
      const sel=isSel(mid,lbl);
      btn.classList.toggle('selected',sel);
      let bb=btn.querySelector('.bb-badge');
      if(sel&&mCnt(mid)>=2){if(!bb){bb=document.createElement('span');bb.className='bb-badge';bb.textContent='BB';btn.prepend(bb);}}
      else if(bb)bb.remove();
    });
  }
  renderTicket();
}

/* ── RENDER TICKET ── */
function renderTicket(){
  const t=state.ticket,sk=state.stake;
  const tOdd=t.length?+t.reduce((a,s)=>a*s.odd,1).toFixed(2):1;
  const win=+(sk*tOdd).toFixed(2);
  const profit=+(win-sk).toFixed(2);
  const eProb=t.length?+(t.reduce((a,s)=>a*(s.prob/100),1)*100).toFixed(1):0;
  const rPct=Math.min(100,Math.round((Math.log(Math.max(1.01,tOdd))/Math.log(50))*100));

  const sels=t.length===0?
    '<div class="tp-empty">Selectează cote din meciuri pentru a construi biletul</div>':
    `<div class="tp-sel-list">${t.map(s=>{
      const esc=v=>v.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return `<div class="tp-sel">
        <div class="tp-sel-match"><span class="tp-day">${s.dayLabel}</span>${s.home} vs ${s.away}</div>
        <div class="tp-sel-row"><span>${s.label}</span>
          <div style="display:flex;align-items:center;gap:6px">
            <span class="tp-sel-odd">@${s.odd}</span>
            <button class="tp-remove" onclick="toggleSel('${s.matchId}','${esc(s.home)}','${esc(s.away)}','${esc(s.label)}',${s.prob},${s.odd})">✕</button>
          </div>
        </div>
      </div>`;
    }).join('')}</div>`;

  document.getElementById('ticketPanel').innerHTML=`<div class="tp">
    <div class="tp-hdr">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00E676" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>
      <h2>Bilet de Pariuri</h2>
      <div class="tp-cnt">Selecții: <span>${t.length}/8</span></div>
    </div>
    ${sels}
    <div class="tp-calc">
      <div class="stake-row">${[25,50,100,150,200].map(v=>`<button class="stake-btn" onclick="setStake(${v})">${v}</button>`).join('')}</div>
      <input class="stake-input" type="number" id="stakeInp" value="${sk}" min="1" placeholder="Miză (RON)"
        oninput="state.stake=+this.value||100;renderTicket()">
      <div class="calc-row"><span>Cotă totală</span><span style="color:var(--blue)">@${tOdd}</span></div>
      <div class="calc-row"><span>Prob. estimată</span><span>${eProb}%</span></div>
      <div class="calc-row"><span>Câștig potențial</span><span style="color:var(--green)">${win.toLocaleString('ro-RO')} RON</span></div>
      <div class="calc-row"><span>Profit net</span><span style="color:${profit>=0?'var(--green)':'var(--red)'}">+${profit.toLocaleString('ro-RO')} RON</span></div>
      <div class="risk-bar-wrap">
        <div class="risk-label"><span>Conservator</span><span>Agresiv</span></div>
        <div class="risk-bar"><div class="risk-pointer" style="left:${rPct}%"></div></div>
      </div>
      <button class="tp-btn" ${t.length<2?'disabled':''}
        onclick="alert('Bilet gata!\\nCotă: @${tOdd}\\nMiză: ${sk} RON\\nCâștig: ${win} RON')">
        ${t.length<2?'Adaugă min. 2 selecții':'🎯 Bilet Gata — @'+tOdd}
      </button>
    </div>
  </div>`;
}

function setStake(v){state.stake=v;const i=document.getElementById('stakeInp');if(i)i.value=v;renderTicket();}
function forceReload(){const d=dayDate(state.day);delete cache[cacheKey(d)];renderAll();}

async function renderAll(){
  buildDayBar();renderTicket();
  await loadMatches();
}

renderAll();
</script>
